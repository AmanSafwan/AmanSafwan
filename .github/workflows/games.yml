name: Generate profile assets

on:
  schedule:
    - cron: "0 */4 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: generate snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=ff2d2d&color_dots=#050505,#111111,#1a1a1a,#222222,#ff2d2d&color_background=050505
            dist/snake-dark.svg?color_snake=ff2d2d&color_dots=#050505,#111111,#1a1a1a,#222222,#ff2d2d&color_background=050505&palette=github-dark

      - name: write sync timestamp
        run: echo "$(date -u +'%Y-%m-%d %H:%M UTC')" > dist/last-sync.txt

      - name: push profile assets to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
