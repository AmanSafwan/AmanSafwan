name: Generate profile assets

on:
  schedule:
    - cron: "0 */4 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: generate snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: generate arcade contribution games
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: pacman,breakout,galaga,puzzle-bobble,bomberman,minesweeper

      - name: generate github stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=radical&hide_border=true&include_all_commits=true&bg_color=0d0221&title_color=00f5ff&icon_color=ff00ea&text_color=e0e0e0
          path: dist/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=radical&hide_border=true&langs_count=8&bg_color=0d0221&title_color=00f5ff&text_color=e0e0e0
          path: dist/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate streak stats card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=radical&hide_border=true&background=0D0221&ring=00F5FF&fire=FF00EA&currStreakLabel=00F5FF
          path: dist/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate trophy card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: username=${{ github.repository_owner }}&theme=matrix&no-bg=true&no-frame=true&column=4&margin-w=10&margin-h=10
          path: dist/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate ophthamind pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=ophthamind-eye-disease-classification&theme=radical&hide_border=true&bg_color=0d0221&title_color=00f5ff&icon_color=ff00ea&text_color=e0e0e0
          path: dist/pin-ophthamind.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate portfolio pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=portfolio-aman&theme=radical&hide_border=true&bg_color=0d0221&title_color=00f5ff&icon_color=ff00ea&text_color=e0e0e0
          path: dist/pin-portfolio.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate retail intelligence pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Retail-Sales-Intelligence-System&theme=radical&hide_border=true&bg_color=0d0221&title_color=00f5ff&icon_color=ff00ea&text_color=e0e0e0
          path: dist/pin-retail.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate restaurant api pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=CSW33903-RESTAURANT-MENU-API&theme=radical&hide_border=true&bg_color=0d0221&title_color=00f5ff&icon_color=ff00ea&text_color=e0e0e0
          path: dist/pin-restaurant.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate database pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=CSD34403_AdvancedDatabase_GroupProject&theme=radical&hide_border=true&bg_color=0d0221&title_color=00f5ff&icon_color=ff00ea&text_color=e0e0e0
          path: dist/pin-database.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate snake animated gif
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-animated.gif?color_snake=00f5ff&color_dots=#0d0221,#1a0533,#4a148c,#7b2ff7,#ff00ea&color_background=0d0221

      - name: generate activity graph
        run: |
          curl -sL "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=${{ github.repository_owner }}&theme=radical" -o dist/activity-graph.svg

      - name: generate live score summary
        run: |
          curl -sL "https://github-profile-summary-cards.vercel.app/api/cards/stats?username=${{ github.repository_owner }}&theme=radical" -o dist/score-summary.svg

      - name: write sync timestamp
        run: echo "$(date -u +'%Y-%m-%d %H:%M UTC')" > dist/last-sync.txt

      - name: push profile assets to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
